name: Deploy StudioBoard to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Vite app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'                       # Vite requires Node 20.19+ or 22.12+; using 22.x ensures compatibility
          cache: 'npm'
          cache-dependency-path: 'studioboard/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./studioboard

      - name: Run tests if a test script exists
        run: |
          # Exit 0 (skip) when no test script is defined in package.json
          node -e "const p=require('./studioboard/package.json'); process.exit(!(p.scripts && p.scripts.test));" \
            && (cd studioboard && npm test) \
            || echo 'No test script found in studioboard/package.json — skipping tests'
        shell: bash

      - name: Build
        run: npm run build
        working-directory: ./studioboard

      - name: List build output (debug)
        run: ls -la ./studioboard/dist
        continue-on-error: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./studioboard/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4